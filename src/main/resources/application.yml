spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/periodtracker
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  flyway:
    baseline-on-migrate: true

  sql:
    init:
      mode: never

logging:
  level:
    org.springframework.jdbc.core: DEBUG
    org.springframework.jdbc.datasource: DEBUG
