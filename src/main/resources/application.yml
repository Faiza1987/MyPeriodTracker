spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/periodtracker
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  flyway:
    baseline-on-migrate: true

  sql:
    init:
      mode: never

  # === Spring AI + Gemini (via OpenAI compat) ===
  ai:
    openai:
      api-key: ${GEMINI_API_KEY}  # Pulls from env var
      base-url: https://generativelanguage.googleapis.com/v1beta/openai/
      chat:
        options:
          model: gemini-1.5-flash  # Fast for dev; use gemini-1.5-pro for better results

logging:
  level:
    org.springframework.jdbc.core: DEBUG
    org.springframework.jdbc.datasource: DEBUG
    org.springframework.ai: DEBUG  # Helpful for AI debugging